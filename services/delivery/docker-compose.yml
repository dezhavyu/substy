services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery
      POSTGRES_DB: delivery
    ports:
      - "5436:5432"
    volumes:
      - delivery_pg_data:/var/lib/postgresql/data
      - ./delivery_service/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery -d delivery"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "63791:6379"

  nats:
    image: nats:2.11-alpine
    command: ["-js"]
    ports:
      - "4225:4222"

  delivery-api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    command: ["uvicorn", "delivery_service.main:app", "--host", "0.0.0.0", "--port", "8092"]
    ports:
      - "8092:8092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started

  delivery-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    command: ["python", "-m", "delivery_service.consumers.run_consumer"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started

  delivery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    command: ["arq", "delivery_service.workers.arq_worker.WorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started

volumes:
  delivery_pg_data:
