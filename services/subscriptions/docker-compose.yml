services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: subscriptions
      POSTGRES_PASSWORD: subscriptions
      POSTGRES_DB: subscriptions
    ports:
      - "5434:5432"
    volumes:
      - subscriptions_pg_data:/var/lib/postgresql/data
      - ./subscriptions_service/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subscriptions -d subscriptions"]
      interval: 5s
      timeout: 3s
      retries: 20

  subscriptions-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  subscriptions_pg_data:
