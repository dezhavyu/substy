name: Integration CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4

      - name: Detect embedded frontend
        id: frontend-local
        run: |
          if [ -d "substy_web/notification-platform-frontend" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout frontend repository
        if: ${{ steps.frontend-local.outputs.exists != 'true' && vars.FRONTEND_REPOSITORY != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.FRONTEND_REPOSITORY }}
          path: substy_web/notification-platform-frontend
          token: ${{ secrets.FRONTEND_REPOSITORY_TOKEN || github.token }}

      - name: Ensure frontend source exists
        run: |
          if [ ! -d "substy_web/notification-platform-frontend" ]; then
            echo "Frontend source is missing."
            echo "Set repository variable FRONTEND_REPOSITORY to your frontend repo (owner/name),"
            echo "or commit frontend sources into this repository at substy_web/notification-platform-frontend."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: substy_web/notification-platform-frontend/package-lock.json

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: substy_web/notification-platform-frontend/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('substy_web/notification-platform-frontend/package-lock.json') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('substy_web/notification-platform-frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install frontend dependencies
        if: ${{ steps.cache-node-modules.outputs.cache-hit != 'true' }}
        working-directory: substy_web/notification-platform-frontend
        run: npm ci

      - name: Install Playwright browser dependencies
        working-directory: substy_web/notification-platform-frontend
        run: npx playwright install --with-deps chromium

      - name: Create CI env file
        run: |
          cat > .env.ci <<'ENV'
          APP_ENV=ci
          APP_LOG_LEVEL=INFO
          APP_JSON_LOGS=true
          POSTGRES_USER=substy
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=substy
          JWT_ALGORITHM=HS256
          JWT_ISSUER=auth-service
          JWT_AUDIENCE=substy
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_ACCESS_TOKEN_TTL_MINUTES=15
          JWT_REFRESH_TOKEN_TTL_SECONDS=7200
          REFRESH_TOKEN_PEPPER=${{ secrets.REFRESH_TOKEN_PEPPER }}
          RATE_LIMIT_LOGIN=20
          RATE_LIMIT_REGISTER=20
          RATE_LIMIT_WINDOW_SECONDS=60
          RATE_LIMIT_AUTH_PER_MINUTE=120
          RATE_LIMIT_USER_PER_MINUTE=240
          NATS_STREAM_NAME=NOTIFICATIONS
          NATS_SUBJECT_NOTIFICATION_CREATED=notification.created.v1
          NATS_SUBJECT_DELIVERY_SUCCEEDED=delivery.succeeded.v1
          NATS_SUBJECT_DELIVERY_FAILED=delivery.failed.v1
          OUTBOX_BATCH_SIZE=100
          OUTBOX_PUBLISH_INTERVAL_SECONDS=2
          SCHEDULER_BATCH_SIZE=200
          SCHEDULER_TICK_INTERVAL_SECONDS=2
          PROVIDER_STUB_FAIL_RATE=0.0
          CORS_ALLOW_ORIGINS=http://localhost:3000
          NEXT_PUBLIC_API_URL=http://bff-gateway:8070
          NEXT_PUBLIC_TOPICS_PAGE_SIZE=20
          NEXT_PUBLIC_INBOX_PAGE_SIZE=20
          FRONTEND_DIR=./substy_web/notification-platform-frontend
          E2E_SUBSCRIPTIONS_URL=http://localhost:8090
          E2E_ADMIN_USER_ID=00000000-0000-0000-0000-000000000001
          ENV

      - name: Start integration stack
        run: docker compose -f docker-compose.ci.yml --env-file .env.ci up -d --build

      - name: Wait for BFF healthcheck
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:8070/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.ci.yml --env-file .env.ci logs bff-gateway
          exit 1

      - name: Run Playwright e2e
        working-directory: substy_web/notification-platform-frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_USE_EXTERNAL_SERVER: "true"
          E2E_SUBSCRIPTIONS_URL: http://localhost:8090
          E2E_ADMIN_USER_ID: 00000000-0000-0000-0000-000000000001
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: substy_web/notification-platform-frontend/playwright-report
          if-no-files-found: ignore

      - name: Stop integration stack
        if: always()
        run: |
          if [ -f .env.ci ]; then
            docker compose -f docker-compose.ci.yml --env-file .env.ci down -v --remove-orphans
          else
            docker compose -f docker-compose.ci.yml down -v --remove-orphans
          fi
